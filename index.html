<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/d874eaaaf0.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <div class="app">

        <!-- PLAYLIST -->
        <div class="playlist" id="playlist"></div>

        <!-- PLAYER -->
        <div class="music-play">

            <div class="wave">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <img src="" class="song">

            <h1 id="title">Title</h1>
            <p id="artist">Artist</p>

            <audio id="song"></audio>

            <input type="range" id="progress" value="0">

            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <div class="prev-btn"><i class="fa-solid fa-backward"></i></div>
                <div class="play-btn" onclick="playPause()">
                    <i class="fa-solid fa-play" id="ctrlIcon"></i>
                </div>
                <div class="next-btn"><i class="fa-solid fa-forward"></i></div>
            </div>

            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">

        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
